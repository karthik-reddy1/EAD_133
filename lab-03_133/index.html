<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page with Password Validation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2>Login</h2>
            <form onsubmit="return validateForm()">
                <div class="input-box">
                    <input type="text" name="username" id="username" required>
                    <label>Username</label>
                </div>
                <div class="input-box">
                    <input type="password" name="password" id="password" required>
                    <label>Password</label>
                </div>
                <button onclick="" type= "submit">Login</button>
                <p id="error-message" style="color: red; display: none;"></p>
            </form>
        </div>
    </div>

    <script>
        function validateForm() {
            const password = document.getElementById("password").value;
            const errorMessage = document.getElementById("error-message");

            // Password validation rules
            const minLength = 8;
            const hasUpperCase = /[A-Z]/;
            const hasLowerCase = /[a-z]/;
            const hasNumbers = /[0-9]/;
            const hasSpecialChars = /[!@#$%^&*(),.?":{}|<>]/;

            // Validate password
            if (password.length < minLength) {
                errorMessage.textContent = "Password must be at least 8 characters long.";
                errorMessage.style.display = "block";
                return false;
            }
            if (!hasUpperCase.test(password)) {
                errorMessage.textContent = "Password must contain at least one uppercase letter.";
                errorMessage.style.display = "block";
                return false;
            }
            if (!hasLowerCase.test(password)) {
                errorMessage.textContent = "Password must contain at least one lowercase letter.";
                errorMessage.style.display = "block";
                return false;
            }
            if (!hasNumbers.test(password)) {
                errorMessage.textContent = "Password must contain at least one number.";
                errorMessage.style.display = "block";
                return false;
            }
            if (!hasSpecialChars.test(password)) {
                errorMessage.textContent = "Password must contain at least one special character.";
                errorMessage.style.display = "block";
                return false;
            }

            // If all validations pass
            errorMessage.style.display = "none";
            return true;
        }
    </script>
</body>
</html>
